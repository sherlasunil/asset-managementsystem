version: "3.9"

services:

  backend:
    build: ./asset_management
    container_name: django_backend
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "3000:3000"

  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: assetdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"